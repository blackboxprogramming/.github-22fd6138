name: Label Sync

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync-labels:
    name: Sync Repository Labels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Ensure Labels Exist
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const labels = [
              { name: 'bug', color: 'd73a4a', description: 'Something is broken' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or improvement' },
              { name: 'dependencies', color: '0366d6', description: 'Dependency updates' },
              { name: 'automated', color: 'e4e669', description: 'Automated PR or issue' },
              { name: 'deployment', color: '0e8a16', description: 'Deployment related' },
              { name: 'auto-generated', color: 'fbca04', description: 'Auto-generated by workflows' },
              { name: 'security', color: 'b60205', description: 'Security related' },
              { name: 'github-actions', color: '000000', description: 'GitHub Actions CI/CD' },
              { name: 'python', color: '3572A5', description: 'Python related' },
              { name: 'brand', color: 'FF1D6C', description: 'Brand compliance' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label,
                  });
                  console.log(`Created label: ${label.name}`);
                }
              }
            }
