name: Stripe Integration CI

on:
  push:
    branches: [main, master]
    paths:
      - 'src/stripe/**'
      - 'package.json'
  pull_request:
    paths:
      - 'src/stripe/**'
      - 'package.json'
  workflow_dispatch:

jobs:
  test-stripe:
    name: Stripe Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Stripe E2E tests
        run: npm run test:stripe
        env:
          STRIPE_WEBHOOK_SECRET: whsec_test_ci
          STRIPE_WEBHOOK_PORT: '14242'

      - name: Run payment tests
        run: node --test e2e/payments.test.mjs

  validate-webhook:
    name: Validate Webhook Handler
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check all modules
        run: |
          node --check src/stripe/webhook.mjs
          node --check src/stripe/payments.mjs
          node --check src/health.mjs

      - name: Verify exports
        run: |
          node -e "
            import('./src/stripe/webhook.mjs').then(m => {
              if (typeof m.verifySignature !== 'function') throw new Error('verifySignature not exported');
              if (typeof m.handlers !== 'object') throw new Error('handlers not exported');
              console.log('webhook.mjs exports: OK');
            });
          "
          node -e "
            import('./src/stripe/payments.mjs').then(m => {
              const fns = ['createCheckoutSession','createSubscription','cancelSubscription','getPaymentIntent','listPayments','createCustomer','getCustomer'];
              for (const fn of fns) {
                if (typeof m[fn] !== 'function') throw new Error(fn + ' not exported');
              }
              console.log('payments.mjs exports: OK (' + fns.length + ' functions)');
            });
          "
