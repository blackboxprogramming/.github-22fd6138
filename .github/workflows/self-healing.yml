name: Self-Healing

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Deploy"]
    types: [completed]

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  monitor:
    name: Monitor Deployments
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check Health
        id: health
        run: |
          if [ -z "${{ secrets.DEPLOY_URL }}" ]; then
            echo "status=skip" >> $GITHUB_OUTPUT
            echo "DEPLOY_URL not configured, skipping."
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DEPLOY_URL }}/api/health" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Health check status: $STATUS"

      - name: Auto-Rollback
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip' && steps.health.outputs.status != '000'
        run: |
          echo "Health check failed (Status: ${{ steps.health.outputs.status }})"
          echo "Triggering rollback to previous commit..."
          gh workflow run auto-deploy.yml --ref "$(git rev-parse HEAD~1)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Issue on Failure
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip' && steps.health.outputs.status != '000'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deployment,auto-generated',
              state: 'open'
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Self-Healing: Deployment Health Check Failed',
                body: `Deployment health check failed.\n\nStatus: ${{ steps.health.outputs.status }}\nWorkflow: ${context.workflow}\nRun: ${context.runId}\nTimestamp: ${new Date().toISOString()}`,
                labels: ['bug', 'deployment', 'auto-generated']
              });
            }
