name: Self-Healing

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]

jobs:
  monitor-pis:
    name: Monitor Pi Fleet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Health check all Pis
        id: health
        run: |
          HOSTS="${{ secrets.PI_HOSTS }}"
          if [ -z "${HOSTS}" ]; then
            echo "status=skip" >> $GITHUB_OUTPUT
            echo "No PI_HOSTS configured, skipping"
            exit 0
          fi

          IFS=',' read -ra HOST_ARR <<< "${HOSTS}"
          FAILED=""
          for host in "${HOST_ARR[@]}"; do
            host=$(echo "${host}" | xargs)
            STATUS=$(curl -sf --connect-timeout 10 "http://${host}:4242/health" 2>/dev/null && echo "ok" || echo "down")
            echo "${host}: ${STATUS}"
            if [ "${STATUS}" != "ok" ]; then
              FAILED="${FAILED} ${host}"
            fi
          done

          if [ -n "${FAILED}" ]; then
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "failed_hosts=${FAILED}" >> $GITHUB_OUTPUT
          else
            echo "status=healthy" >> $GITHUB_OUTPUT
          fi

      - name: Create issue on failure
        if: steps.health.outputs.status == 'unhealthy'
        uses: actions/github-script@v7
        with:
          script: |
            const failedHosts = '${{ steps.health.outputs.failed_hosts }}'.trim();
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pi-health',
              per_page: 5,
            });
            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Still unhealthy: ${failedHosts}\nRun: ${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Pi fleet health check failed',
                body: `Unhealthy hosts:\n${failedHosts.split(' ').filter(Boolean).map(h => '- ' + h).join('\n')}\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                labels: ['bug', 'pi-health', 'auto-generated'],
              });
            }

  monitor-cloudflare:
    name: Monitor Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Check deploy URL
        run: |
          URL="${{ secrets.DEPLOY_URL }}"
          if [ -z "${URL}" ]; then
            echo "No DEPLOY_URL configured, skipping"
            exit 0
          fi
          STATUS=$(curl -sf --connect-timeout 10 -o /dev/null -w "%{http_code}" "${URL}" || echo "000")
          echo "Cloudflare status: ${STATUS}"
          if [ "${STATUS}" != "200" ] && [ "${STATUS}" != "000" ]; then
            echo "WARN: Cloudflare returned ${STATUS}"
          fi
