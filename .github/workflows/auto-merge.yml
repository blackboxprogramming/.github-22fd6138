name: Auto-Merge

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-Merge Approved PRs
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-merge eligible PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'updated',
              direction: 'desc',
              per_page: 30,
            });

            // Labels that qualify for auto-merge
            const autoMergeLabels = new Set([
              'auto-merge',
              'dependencies',
              'stripe-integration',
              'automated',
            ]);

            for (const pr of pulls) {
              const prLabels = pr.labels.map(l => l.name);
              const eligible = prLabels.some(l => autoMergeLabels.has(l));

              if (!eligible) {
                console.log(`PR #${pr.number}: not eligible (labels: ${prLabels.join(', ')})`);
                continue;
              }

              // Check if all status checks passed
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              });

              const allPassed = checks.check_runs.length > 0 &&
                checks.check_runs.every(c => c.conclusion === 'success' || c.conclusion === 'skipped');

              if (!allPassed) {
                console.log(`PR #${pr.number}: checks not passed yet`);
                continue;
              }

              // Check for at least one approval (skip for dependabot/bot PRs)
              const isBot = pr.user.type === 'Bot';
              if (!isBot) {
                const { data: reviews } = await github.rest.pulls.listReviews({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                });
                const approved = reviews.some(r => r.state === 'APPROVED');
                if (!approved) {
                  console.log(`PR #${pr.number}: waiting for approval`);
                  continue;
                }
              }

              // Merge it
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: `${pr.title} (#${pr.number})`,
                });
                console.log(`PR #${pr.number}: MERGED`);

                // Comment on the PR
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `Auto-merged by BlackRoad CI. All checks passed.`,
                });
              } catch (err) {
                console.error(`PR #${pr.number}: merge failed — ${err.message}`);
              }
            }
